services:
  - type: web
    name: loadflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gthread --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # You can add AWS environment variables here if you want to use real AWS
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_DEFAULT_REGION
      #   value: us-east-1
